# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: llmbroker
site_url: https://andgineer.github.io/llmbroker
site_author: Andrey Sorokin

# Repository
repo_name: llmbroker
repo_url: https://github.com/andgineer/llmbroker
edit_uri: edit/master/docs
docs_dir: 'src/LANGUAGE'
site_dir: 'SITE_DIR'

plugins:
  - awesome-pages
  - search:
      lang: LANGUAGE
  - mkdocstrings:
        handlers:
          python:
            options:
              show_root_heading: true

markdown_extensions:
  - abbr
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: 'docs/includes'
  - admonition

extra:
  alternate:
    - name: English
      link: /llmbroker/
      lang: en
    - name: Русский
      link: /llmbroker/ru/
      lang: ru

nav:
  - index.md
  - installation.md
